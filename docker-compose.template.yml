# Copy to docker-compose.yml (gitignored) and run:
#   docker compose pull
#   docker compose up -d
#
# Images are built and published to ghcr.io on push to main (see .github/workflows/ci.yml).
# Pumble secrets: add PUMBLE_* vars to the root .env (see .env.template).

services:
    mirotalksfu:
        image: ghcr.io/anathareridan/mirotalksfu:latest
        container_name: mirotalksfu
        hostname: mirotalksfu
        restart: unless-stopped
        environment:
            NODE_OPTIONS: --max-old-space-size=512
            SFU_NUM_WORKERS: 1
            MEMORY_MONITOR_INTERVAL_MS: 60000
        mem_limit: 1g
        mem_reservation: 512m
        # network_mode: 'host'
        ports:
            - '3010:3010/tcp'
            - '40000-40100:40000-40100/tcp'
            - '40000-40100:40000-40100/udp'
        volumes:
            - ./app/src/config.js:/src/app/src/config.js:ro
            - ./.env:/src/.env:ro
            # - ./app/rec:/src/app/rec
            # - ./app/rtmp:/src/app/rtmp
            # - ./app/:/src/app/:ro
            # - ./public/:/src/public/:ro

    pumble-mirotalk:
        image: ghcr.io/anathareridan/mirotalksfu/pumble-mirotalk:latest
        container_name: pumble-mirotalk
        hostname: pumble-mirotalk
        restart: unless-stopped
        depends_on:
            mirotalksfu:
                condition: service_started
        ports:
            - '${PUMBLE_ADDON_HOST_PORT:-5510}:5500/tcp'
        env_file:
            - .env
        environment:
            PUMBLE_ADDON_PORT: 5500
            PUMBLE_TOKENS_PATH: /app/data/tokens.json
        volumes:
            - ./pumble-mirotalk/data:/app/data
            - ./pumble-mirotalk/app.config.json:/app/app.config.json:ro
        healthcheck:
            test:
                [
                    'CMD',
                    'node',
                    '-e',
                    "require('http').get('http://127.0.0.1:5500/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
                ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 20s
